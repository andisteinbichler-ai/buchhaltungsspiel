<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mimi & Max – Vom Limonadenstand zum Unternehmen</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #1a1a2e; --panel: #16213e; --accent: #f7c59f;
  --green: #4ecdc4; --red: #ff6b6b; --yellow: #ffe66d;
  --text: #e0e0e0; --muted: #888; --border: #2a2a4a;
  --card: #0f3460; --story-bg: #1e1e3a;
}
body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

/* ── SCREEN SYSTEM ── */
.screen { display: none; }
.screen.active { display: flex; }

/* ── TITLE SCREEN ── */
#screen-title {
  flex-direction: column; align-items: center; justify-content: center;
  min-height: 100vh; text-align: center; padding: 2rem;
  background: radial-gradient(ellipse at 50% 40%, #0f3460 0%, #1a1a2e 70%);
}
#screen-title .logo { font-size: 4rem; margin-bottom: 0.5rem; }
#screen-title h1 { font-size: 2.2rem; color: var(--accent); margin-bottom: 0.3rem; }
#screen-title .subtitle { color: var(--muted); margin-bottom: 2.5rem; font-size: 1.1rem; }
#screen-title .chars { display: flex; gap: 3rem; justify-content: center; margin-bottom: 2.5rem; }
.char-card { background: var(--card); border-radius: 1rem; padding: 1.2rem 1.5rem; width: 140px; text-align: center; border: 1px solid var(--border); }
.char-card .avatar { font-size: 2.5rem; margin-bottom: 0.4rem; }
.char-card strong { color: var(--accent); display: block; margin-bottom: 0.3rem; }
.char-card span { font-size: 0.8rem; color: var(--muted); }
.btn { background: var(--accent); color: #1a1a2e; border: none; padding: 0.9rem 2.5rem; border-radius: 2rem; font-size: 1.1rem; font-weight: 700; cursor: pointer; transition: transform 0.1s, opacity 0.2s; }
.btn:hover { transform: scale(1.04); }
.btn:active { transform: scale(0.97); }
.btn-secondary { background: transparent; color: var(--accent); border: 2px solid var(--accent); }

/* ── MAIN GAME LAYOUT ── */
#screen-game {
  flex-direction: row; min-height: 100vh;
}
#sidebar {
  width: 240px; min-width: 240px; background: var(--panel); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; padding: 1rem; gap: 0.7rem; overflow-y: auto;
}
#sidebar .logo-small { font-size: 1.4rem; font-weight: 700; color: var(--accent); text-align: center; padding-bottom: 0.7rem; border-bottom: 1px solid var(--border); margin-bottom: 0.3rem; }
.kpi-box { background: var(--card); border-radius: 0.6rem; padding: 0.6rem 0.8rem; }
.kpi-box .kpi-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
.kpi-box .kpi-val { font-size: 1.3rem; font-weight: 700; color: var(--green); }
.kpi-box .kpi-val.red { color: var(--red); }
.kpi-box .kpi-val.yellow { color: var(--yellow); }
.chapter-list { flex: 1; overflow-y: auto; }
.chapter-list .part-header { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); padding: 0.5rem 0.2rem 0.2rem; }
.ch-item { padding: 0.4rem 0.6rem; border-radius: 0.4rem; font-size: 0.82rem; cursor: pointer; display: flex; align-items: center; gap: 0.4rem; color: var(--muted); transition: background 0.15s; }
.ch-item:hover { background: var(--border); color: var(--text); }
.ch-item.active { background: var(--accent); color: #1a1a2e; font-weight: 600; }
.ch-item.done { color: var(--green); }
.ch-item.done::before { content: '✓'; font-size: 0.7rem; }
.ch-item.locked { opacity: 0.35; cursor: default; }
.ch-item.locked:hover { background: transparent; }

/* ── MAIN CONTENT ── */
#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
#tab-bar { display: flex; border-bottom: 1px solid var(--border); background: var(--panel); }
.tab { padding: 0.7rem 1.2rem; font-size: 0.85rem; cursor: pointer; color: var(--muted); border-bottom: 2px solid transparent; transition: all 0.15s; }
.tab:hover { color: var(--text); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

#content-area { flex: 1; overflow-y: auto; padding: 1.5rem; }

/* ── STORY VIEW ── */
#view-story { display: flex; flex-direction: column; gap: 1rem; }
.story-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 0.5rem; }
.story-header .ch-badge { background: var(--accent); color: #1a1a2e; font-size: 0.7rem; font-weight: 700; padding: 0.2rem 0.6rem; border-radius: 1rem; }
.story-header h2 { font-size: 1.4rem; color: var(--accent); }
.dialog-box { background: var(--story-bg); border-radius: 0.8rem; padding: 1.2rem; border-left: 4px solid var(--accent); min-height: 80px; font-size: 1rem; line-height: 1.6; }
.dialog-box .speaker { font-size: 0.75rem; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.4rem; display: flex; align-items: center; gap: 0.4rem; }
.dialog-box .speaker.mimi { color: #f472b6; }
.dialog-box .speaker.max { color: #60a5fa; }
.dialog-box .speaker.mama { color: var(--green); }
.dialog-box p { line-height: 1.65; }

.choices { display: flex; flex-direction: column; gap: 0.6rem; margin-top: 0.5rem; }
.choice-btn { background: var(--card); border: 2px solid var(--border); color: var(--text); border-radius: 0.6rem; padding: 0.9rem 1.2rem; text-align: left; cursor: pointer; font-size: 0.95rem; transition: all 0.15s; }
.choice-btn:hover { border-color: var(--accent); color: var(--accent); }
.choice-btn.selected { border-color: var(--green); background: rgba(78,205,196,0.1); color: var(--green); }
.choice-btn.wrong { border-color: var(--red); background: rgba(255,107,107,0.1); color: var(--red); }

.btn-next { margin-top: 1rem; align-self: flex-start; }
.btn-small { padding: 0.5rem 1.2rem; font-size: 0.9rem; border-radius: 1.5rem; }

/* ── LEARN CARD ── */
.learn-card { background: linear-gradient(135deg, #0f3460, #1a1a4a); border: 1px solid var(--accent); border-radius: 1rem; padding: 1.5rem; }
.learn-card .learn-icon { font-size: 2rem; margin-bottom: 0.5rem; }
.learn-card h3 { color: var(--accent); font-size: 1.2rem; margin-bottom: 0.7rem; }
.learn-card .formula { background: rgba(247,197,159,0.1); border: 1px solid rgba(247,197,159,0.3); border-radius: 0.5rem; padding: 0.8rem 1rem; font-family: monospace; font-size: 1rem; margin: 0.7rem 0; color: var(--yellow); }
.learn-card p { line-height: 1.65; color: #ccc; font-size: 0.95rem; }

.result-box { background: var(--story-bg); border-radius: 0.8rem; padding: 1.2rem; margin-top: 0.5rem; }
.result-box h4 { color: var(--yellow); margin-bottom: 0.6rem; font-size: 1rem; }
.result-box table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
.result-box td { padding: 0.3rem 0.5rem; border-bottom: 1px solid var(--border); }
.result-box td:last-child { text-align: right; font-weight: 600; }
.result-box .total td { color: var(--green); border-top: 2px solid var(--green); }
.result-box .loss td { color: var(--red); }

/* ── DASHBOARD ── */
#view-dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
.dash-card { background: var(--card); border-radius: 0.8rem; padding: 1.2rem; }
.dash-card h4 { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin-bottom: 0.8rem; }
.dash-stat { display: flex; justify-content: space-between; align-items: center; padding: 0.35rem 0; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
.dash-stat:last-child { border-bottom: none; }
.dash-stat .val { font-weight: 700; color: var(--green); }
.dash-stat .val.red { color: var(--red); }

/* ── BUCHHALTUNG ── */
#view-buchh { display: flex; flex-direction: column; gap: 1rem; }
.buchh-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
.buchh-table th { background: var(--card); padding: 0.6rem 0.8rem; text-align: left; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); }
.buchh-table td { padding: 0.5rem 0.8rem; border-bottom: 1px solid var(--border); }
.buchh-table tr:hover td { background: var(--story-bg); }
.buchh-table .debit { color: var(--green); }
.buchh-table .credit { color: var(--red); }
.tag { display: inline-block; font-size: 0.7rem; padding: 0.1rem 0.4rem; border-radius: 0.3rem; font-weight: 600; }
.tag.einnahme { background: rgba(78,205,196,0.2); color: var(--green); }
.tag.ausgabe { background: rgba(255,107,107,0.2); color: var(--red); }

/* ── LAGER ── */
#view-lager { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1rem; }
.lager-item { background: var(--card); border-radius: 0.8rem; padding: 1rem; text-align: center; }
.lager-item .icon { font-size: 2.2rem; margin-bottom: 0.5rem; }
.lager-item .name { font-size: 0.85rem; color: var(--muted); margin-bottom: 0.3rem; }
.lager-item .qty { font-size: 1.4rem; font-weight: 700; color: var(--accent); }
.lager-item .unit { font-size: 0.75rem; color: var(--muted); }

/* ── NOTIFICATION ── */
#notif { position: fixed; top: 1rem; right: 1rem; z-index: 999; display: flex; flex-direction: column; gap: 0.5rem; }
.notif-item { background: var(--card); border-left: 4px solid var(--green); border-radius: 0.5rem; padding: 0.7rem 1rem; font-size: 0.85rem; max-width: 280px; animation: slideIn 0.3s ease; }
.notif-item.warn { border-left-color: var(--yellow); }
.notif-item.bad { border-left-color: var(--red); }
@keyframes slideIn { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

/* ── CHAPTER COMPLETE ── */
.chapter-complete { background: linear-gradient(135deg, #0f3460, #1a4a2e); border: 2px solid var(--green); border-radius: 1rem; padding: 2rem; text-align: center; }
.chapter-complete .big-icon { font-size: 3.5rem; margin-bottom: 0.5rem; }
.chapter-complete h3 { color: var(--green); font-size: 1.5rem; margin-bottom: 0.5rem; }
.chapter-complete p { color: #ccc; margin-bottom: 1.5rem; }
.chapter-complete .xp-bar { background: var(--border); border-radius: 1rem; height: 8px; overflow: hidden; margin: 1rem 0; }
.chapter-complete .xp-fill { height: 100%; background: linear-gradient(90deg, var(--green), var(--accent)); border-radius: 1rem; transition: width 1s ease; }

/* ── MISC ── */
.divider { border: none; border-top: 1px solid var(--border); margin: 0.5rem 0; }
.flex-row { display: flex; gap: 0.7rem; align-items: center; flex-wrap: wrap; }
.badge { display: inline-block; background: var(--card); border: 1px solid var(--border); border-radius: 0.4rem; padding: 0.2rem 0.6rem; font-size: 0.75rem; color: var(--muted); }
.badge.unlocked { border-color: var(--green); color: var(--green); background: rgba(78,205,196,0.1); }
h2.section-title { font-size: 1.1rem; color: var(--accent); margin-bottom: 0.8rem; padding-bottom: 0.4rem; border-bottom: 1px solid var(--border); }
.progress-bar-wrap { background: var(--border); border-radius: 1rem; height: 6px; overflow: hidden; margin: 0.3rem 0 0.6rem; }
.progress-bar-fill { height: 100%; background: var(--accent); border-radius: 1rem; transition: width 0.4s ease; }
</style>
</head>
<body>

<!-- TITLE SCREEN -->
<div id="screen-title" class="screen active">
  <div class="logo">🍋</div>
  <h1>Mimi &amp; Max</h1>
  <p class="subtitle">Vom Limonadenstand zum Unternehmen</p>
  <div class="chars">
    <div class="char-card">
      <div class="avatar">👧</div>
      <strong>Mimi</strong>
      <span>Analytisch &amp; zahlenliebend</span>
    </div>
    <div class="char-card">
      <div class="avatar">🧒</div>
      <strong>Max</strong>
      <span>Kreativ &amp; marketingbegeistert</span>
    </div>
    <div class="char-card">
      <div class="avatar">👩</div>
      <strong>Mama</strong>
      <span>Unternehmerin &amp; Mentorin</span>
    </div>
  </div>
  <button class="btn" onclick="startGame()">🎮 Spiel starten</button>
</div>

<!-- GAME SCREEN -->
<div id="screen-game" class="screen">
  <!-- Sidebar -->
  <div id="sidebar">
    <div class="logo-small">🍋 Mimi &amp; Max</div>
    <div class="kpi-box">
      <div class="kpi-label">💰 Kassa</div>
      <div class="kpi-val" id="kpi-kassa">0,00 €</div>
    </div>
    <div class="kpi-box">
      <div class="kpi-label">📈 Umsatz gesamt</div>
      <div class="kpi-val yellow" id="kpi-umsatz">0,00 €</div>
    </div>
    <div class="kpi-box">
      <div class="kpi-label">✨ Gewinn gesamt</div>
      <div class="kpi-val" id="kpi-gewinn">0,00 €</div>
    </div>
    <hr class="divider">
    <div class="chapter-list" id="chapter-list"></div>
    <hr class="divider">
    <div style="font-size:0.75rem; color:var(--muted); text-align:center; padding:0.3rem;">
      Kapitel <span id="progress-current">1</span> / 32
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-bar" style="width:3%"></div>
    </div>
  </div>

  <!-- Main -->
  <div id="main">
    <div id="tab-bar">
      <div class="tab active" onclick="switchTab('story')">📖 Story</div>
      <div class="tab" onclick="switchTab('dashboard')">📊 Unternehmen</div>
      <div class="tab" onclick="switchTab('buchh')">📒 Buchhaltung</div>
      <div class="tab" onclick="switchTab('lager')">📦 Lager</div>
    </div>
    <div id="content-area">
      <div id="view-story"></div>
      <div id="view-dashboard" style="display:none"></div>
      <div id="view-buchh" style="display:none"></div>
      <div id="view-lager" style="display:none"></div>
    </div>
  </div>
</div>

<div id="notif"></div>

<script>
// ═══════════════════════════════════════════════
// GAME STATE
// ═══════════════════════════════════════════════
const G = {
  kassa: 10,
  bank: 0,
  umsatz: 10,
  gewinn: 0,
  forderungen: 0,
  verbindlichkeiten: 0,
  lager: { zitronen: 0, zucker: 0, limo: 0 },
  anlagen: [],
  mitarbeiter: [],
  kredite: [],
  buchungen: [],
  currentChapter: 0,
  completedChapters: [],
  storyStep: 0,
  choiceMade: null,
  badges: [],
};

function fmt(n) { return n.toFixed(2).replace('.', ',') + ' €'; }

function notify(msg, type='') {
  const d = document.createElement('div');
  d.className = 'notif-item ' + type;
  d.textContent = msg;
  document.getElementById('notif').appendChild(d);
  setTimeout(() => d.remove(), 3000);
}

function addBuchung(datum, text, art, betrag) {
  G.buchungen.push({ datum, text, art, betrag });
}

function updateKPIs() {
  document.getElementById('kpi-kassa').textContent = fmt(G.kassa);
  document.getElementById('kpi-umsatz').textContent = fmt(G.umsatz);
  const gEl = document.getElementById('kpi-gewinn');
  gEl.textContent = fmt(G.gewinn);
  gEl.className = 'kpi-val' + (G.gewinn < 0 ? ' red' : '');
  const pct = Math.round((G.currentChapter / 32) * 100);
  document.getElementById('progress-bar').style.width = Math.max(3, pct) + '%';
  document.getElementById('progress-current').textContent = G.currentChapter + 1;
}

// ═══════════════════════════════════════════════
// CHAPTERS DATA
// ═══════════════════════════════════════════════
const PARTS = [
  { title: 'Teil 1: Die ersten Unternehmer', chapters: [0,1,2,3,4] },
  { title: 'Teil 2: Ordnung im Chaos', chapters: [5,6,7] },
  { title: 'Teil 3: Das echte Unternehmen', chapters: [8,9,10] },
  { title: 'Teil 4: Kunden & Lieferanten', chapters: [11,12,13,14] },
  { title: 'Teil 5: Die Firma wächst', chapters: [15,16,17,18] },
  { title: 'Teil 6: Die Limonaden GmbH', chapters: [19,20,21] },
  { title: 'Teil 7: Zahlen verstehen', chapters: [22,23,24,25,26] },
  { title: 'Teil 8: Das große Finale', chapters: [27,28,29,30,31] },
];

const CHAPTERS = [
// ─── 0: Kapitel 1 ───
{
  title: 'Kapitel 1: Die 10 Euro',
  badge: '💡 Umsatz ≠ Gewinn',
  steps: [
    { type:'dialog', speaker:'max', text:'Mimi! Wir haben heute 10 Gläser Limonade für je 1 Euro verkauft. Wir haben 10 Euro Gewinn gemacht! 🎉' },
    { type:'dialog', speaker:'mimi', text:'10 Euro Einnahmen. Aber... warte mal. Haben wir wirklich 10 Euro Gewinn?' },
    { type:'dialog', speaker:'mama', text:'Moment mal, ihr zwei. Wisst ihr eigentlich, was der Unterschied zwischen Umsatz und Gewinn ist?' },
    { type:'choice', question:'Was glaubst du: Haben Mimi und Max wirklich 10 Euro Gewinn gemacht?', options:[
      { text:'Ja! 10 Gläser × 1 Euro = 10 Euro Gewinn!', correct: false, feedback:'Fast – aber dabei vergisst du die Kosten für die Zutaten.' },
      { text:'Nein! Zuerst müssen wir die Kosten abziehen.', correct: true, feedback:'Genau! Umsatz ist nicht gleich Gewinn. Kosten müssen erst abgezogen werden.' },
      { text:'Ich weiß es nicht.', correct: false, feedback:'Tipp: Denk an die Zutaten, die sie kaufen mussten.' },
    ]},
    { type:'learn', icon:'💡', title:'Umsatz ≠ Gewinn', content:'<b>Umsatz</b> ist alles, was du einnimmst – also das Geld, das Kunden bezahlen.<br><br><b>Gewinn</b> ist das, was wirklich übrig bleibt – nachdem du alle Kosten abgezogen hast.',
      formula:'Gewinn = Umsatz − Kosten' },
    { type:'result', title:'Die erste Erkenntnis', rows:[
      ['Umsatz (10 Gläser × 1,00 €)', '10,00 €'],
      ['Kosten (noch unbekannt)', '??? €'],
    ], note:'Im nächsten Kapitel entdecken Mimi und Max ihre wirklichen Kosten.' },
  ],
  onComplete: () => {
    notify('💡 Erkenntnis: Umsatz ≠ Gewinn');
    G.badges.push('💡 Umsatz ≠ Gewinn');
  }
},
// ─── 1: Kapitel 2 ───
{
  title: 'Kapitel 2: Der Supermarkt-Schock',
  badge: '🧾 Kosten & Gewinn',
  steps: [
    { type:'dialog', speaker:'mimi', text:'Okay, lass uns nachrechnen. Mama, wir haben für die Zutaten bezahlt – aber wie viel genau?' },
    { type:'dialog', speaker:'mama', text:'Schaut mal auf den Kassenzettel. Zitronen, Zucker und Wasser für 10 Portionen haben euch 6 Euro gekostet.' },
    { type:'dialog', speaker:'max', text:'Waaas?! Dann haben wir ja nur 4 Euro verdient?' },
    { type:'choice', question:'Wie hoch ist der Gewinn bei einem Umsatz von 10 € und Kosten von 6 €?', options:[
      { text:'10 Euro', correct:false, feedback:'Das wäre der Umsatz, nicht der Gewinn.' },
      { text:'4 Euro', correct:true, feedback:'Richtig! 10 € − 6 € = 4 € Gewinn.' },
      { text:'6 Euro', correct:false, feedback:'6 Euro sind die Kosten. Versuch nochmal: Umsatz minus Kosten.' },
    ]},
    { type:'learn', icon:'🧾', title:'Kosten & Gewinn', content:'<b>Kosten</b> sind alle Ausgaben, die für das Unternehmen nötig sind – zum Beispiel Zutaten, Miete oder Strom.<br><br>Erst wenn du die Kosten vom Umsatz abziehst, kennst du deinen echten <b>Gewinn</b>.',
      formula:'Gewinn = 10,00 € − 6,00 € = 4,00 €' },
    { type:'result', title:'Abrechnung nach Kapitel 2', rows:[
      ['Umsatz', '10,00 €'],
      ['Zutaten (Zitronen, Zucker, Wasser)', '−6,00 €'],
    ], total: ['Gewinn', '4,00 €'] },
  ],
  onComplete: () => {
    G.kassa = 4;
    G.gewinn = 4;
    addBuchung('Tag 1', 'Verkauf 10 Gläser Limonade', 'einnahme', 10);
    addBuchung('Tag 1', 'Zutaten Einkauf', 'ausgabe', -6);
    updateKPIs();
    notify('Kassa aktualisiert: ' + fmt(G.kassa));
  }
},
// ─── 2: Kapitel 3 ───
{
  title: 'Kapitel 3: Der richtige Preis',
  badge: '🧮 Kalkulation',
  steps: [
    { type:'dialog', speaker:'max', text:'Wenn wir mehr verdienen wollen, müssen wir einfach mehr Gläser verkaufen!' },
    { type:'dialog', speaker:'mimi', text:'Oder wir erhöhen den Preis. Aber wie viel darf ein Glas kosten?' },
    { type:'dialog', speaker:'mama', text:'Erst müsst ihr wissen, was ein Glas euch kostet – das nennt man Selbstkosten. Dann könnt ihr einen sinnvollen Preis berechnen.' },
    { type:'dialog', speaker:'mimi', text:'Also: Ein Glas kostet uns 0,60 €. Wenn wir 50 Cent Gewinn wollen, müssen wir es für...' },
    { type:'choice', question:'Die Selbstkosten pro Glas sind 0,60 €. Mimi will 50 Cent Gewinn pro Glas. Welcher Preis ist richtig?', options:[
      { text:'0,60 €', correct:false, feedback:'Das wäre kein Gewinn – nur die Kosten gedeckt.' },
      { text:'1,10 €', correct:true, feedback:'Perfekt! 0,60 € + 0,50 € = 1,10 € Verkaufspreis.' },
      { text:'1,50 €', correct:false, feedback:'Möglich, aber die Aufgabe sagt: genau 0,50 € Gewinn. Also 0,60 + 0,50 = 1,10 €.' },
    ]},
    { type:'learn', icon:'🧮', title:'Kalkulation & Selbstkosten', content:'<b>Selbstkosten</b> sind alle Kosten, die entstehen um ein Produkt herzustellen.<br><br>Der <b>Verkaufspreis</b> muss mindestens die Selbstkosten decken – und idealer Weise noch einen <b>Gewinnaufschlag</b> enthalten.',
      formula:'Verkaufspreis = Selbstkosten + Gewinnaufschlag' },
    { type:'result', title:'Kalkulation Glas Limonade', rows:[
      ['Materialkosten (Zitronen, Zucker, Wasser)', '0,40 €'],
      ['Anteilige sonstige Kosten', '0,20 €'],

// ═══════════════════════════════════════════════
// CHAPTER LIST RENDERING
// ═══════════════════════════════════════════════
function buildChapterList() {
  const container = document.getElementById('chapter-list');
  container.innerHTML = '';
  PARTS.forEach(part => {
    const ph = document.createElement('div');
    ph.className = 'part-header';
    ph.textContent = part.title;
    container.appendChild(ph);
    part.chapters.forEach(ci => {
      const ch = CHAPTERS[ci];
      const div = document.createElement('div');
      const done = G.completedChapters.includes(ci);
      const active = G.currentChapter === ci;
      const locked = ci > 0 && !G.completedChapters.includes(ci - 1) && ci !== G.currentChapter;
      div.className = 'ch-item' + (active ? ' active' : '') + (done ? ' done' : '') + (locked ? ' locked' : '');
      div.textContent = (ci + 1) + '. ' + ch.title.replace('Kapitel ' + (ci+1) + ': ', '');
      if (!locked) div.onclick = () => goToChapter(ci);
      container.appendChild(div);
    });
  });
}

// ═══════════════════════════════════════════════
// STORY RENDERING
// ═══════════════════════════════════════════════
function renderStory() {
  const ch = CHAPTERS[G.currentChapter];
  const step = ch.steps[G.storyStep];
  const view = document.getElementById('view-story');
  view.innerHTML = '';

  // Header
  const hdr = document.createElement('div');
  hdr.className = 'story-header';
  hdr.innerHTML = `<span class="ch-badge">Kapitel ${G.currentChapter + 1}</span><h2>${ch.title}</h2>`;
  view.appendChild(hdr);

  // Progress dots
  const dots = document.createElement('div');
  dots.className = 'flex-row';
  ch.steps.forEach((s, i) => {
    const d = document.createElement('div');
    d.style.cssText = `width:8px;height:8px;border-radius:50%;background:${i < G.storyStep ? 'var(--green)' : i === G.storyStep ? 'var(--accent)' : 'var(--border)'}`;
    dots.appendChild(d);
  });
  view.appendChild(dots);

  if (!step) {
    renderChapterComplete(view);
    return;
  }

  if (step.type === 'dialog') renderDialog(view, step);
  else if (step.type === 'choice') renderChoice(view, step);
  else if (step.type === 'learn') renderLearn(view, step);
  else if (step.type === 'result') renderResult(view, step);
}

function renderDialog(view, step) {
  const box = document.createElement('div');
  box.className = 'dialog-box';
  const avatars = { mimi: '👧 Mimi', max: '🧒 Max', mama: '👩 Mama', narrator: '📖' };
  const avatar = avatars[step.speaker] || step.speaker;
  box.innerHTML = `<div class="speaker ${step.speaker}">${avatar}</div><p>${step.text}</p>`;
  view.appendChild(box);
  addNextBtn(view);
}

function renderChoice(view, step) {
  const box = document.createElement('div');
  box.className = 'dialog-box';
  box.innerHTML = `<div class="speaker">❓ Deine Entscheidung</div><p><strong>${step.question}</strong></p>`;
  view.appendChild(box);

  const choices = document.createElement('div');
  choices.className = 'choices';
  step.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = opt.text;
    btn.onclick = () => makeChoice(btn, opt, choices);
    choices.appendChild(btn);
  });
  view.appendChild(choices);
}

function makeChoice(btn, opt, container) {
  if (G.choiceMade) return;
  G.choiceMade = opt;
  Array.from(container.children).forEach(b => b.onclick = null);
  btn.className = 'choice-btn ' + (opt.correct ? 'selected' : 'wrong');

  const fb = document.createElement('div');
  fb.className = 'dialog-box';
  fb.style.borderLeftColor = opt.correct ? 'var(--green)' : 'var(--red)';
  fb.innerHTML = `<div class="speaker">${opt.correct ? '✅' : '💡'} ${opt.correct ? 'Richtig!' : 'Fast!'}</div><p>${opt.feedback}</p>`;
  container.parentElement.appendChild(fb);

  if (opt.correct) notify('✅ Richtig!', '');
  else notify('💡 ' + opt.feedback, 'warn');

  addNextBtn(container.parentElement);
}

function renderLearn(view, step) {
  const card = document.createElement('div');
  card.className = 'learn-card';
  card.innerHTML = `
    <div class="learn-icon">${step.icon}</div>
    <h3>${step.title}</h3>
    <p>${step.content}</p>
    ${step.formula ? `<div class="formula">${step.formula}</div>` : ''}
  `;
  view.appendChild(card);
  addNextBtn(view);
}

function renderResult(view, step) {
  const box = document.createElement('div');
  box.className = 'result-box';
  let html = `<h4>📊 ${step.title}</h4><table>`;
  step.rows.forEach(row => {
    const style = row[1] === '' ? 'style="color:var(--muted);font-weight:600;padding-top:0.6rem;"' : '';
    html += `<tr ${style}><td>${row[0]}</td><td>${row[1]}</td></tr>`;
  });
  if (step.total) html += `<tr class="total"><td>${step.total[0]}</td><td>${step.total[1]}</td></tr>`;
  html += '</table>';
  if (step.note) html += `<p style="margin-top:0.6rem;font-size:0.85rem;color:var(--muted);">${step.note}</p>`;
  box.innerHTML = html;
  view.appendChild(box);
  addNextBtn(view);
}

function renderChapterComplete(view) {
  const ch = CHAPTERS[G.currentChapter];
  const pct = Math.round(((G.currentChapter + 1) / 32) * 100);
  const box = document.createElement('div');
  box.className = 'chapter-complete';
  box.innerHTML = `
    <div class="big-icon">⭐</div>
    <h3>Kapitel abgeschlossen!</h3>
    <p>${ch.badge} gemeistert!</p>
    <div class="xp-bar"><div class="xp-fill" style="width:0%" id="xp-fill"></div></div>
    <p style="font-size:0.8rem;color:var(--muted);">Gesamtfortschritt: ${pct} %</p>
    ${G.currentChapter < 31 ? `<button class="btn btn-small" onclick="nextChapter()" style="margin-top:1rem">Nächstes Kapitel →</button>` : `<button class="btn btn-small" onclick="showTitle()" style="margin-top:1rem">🏠 Zum Anfang</button>`}
  `;
  view.appendChild(box);
  setTimeout(() => {
    const fill = document.getElementById('xp-fill');
    if (fill) fill.style.width = pct + '%';
  }, 100);
}

function addNextBtn(view) {
  const btn = document.createElement('button');
  btn.className = 'btn btn-small btn-next';
  btn.textContent = 'Weiter →';
  btn.onclick = advanceStory;
  view.appendChild(btn);
}

function advanceStory() {
  G.storyStep++;
  G.choiceMade = null;
  const ch = CHAPTERS[G.currentChapter];
  if (G.storyStep >= ch.steps.length) {
    if (!G.completedChapters.includes(G.currentChapter)) {
      G.completedChapters.push(G.currentChapter);
      if (ch.onComplete) ch.onComplete();
    }
    buildChapterList();
    updateKPIs();
  }
  renderStory();
}

function nextChapter() {
  if (G.currentChapter < 31) {
    G.currentChapter++;
    G.storyStep = 0;
    G.choiceMade = null;
    buildChapterList();
    updateKPIs();
    renderStory();
    switchTab('story');
  }
}

function goToChapter(idx) {
  G.currentChapter = idx;
  G.storyStep = 0;
  G.choiceMade = null;
  buildChapterList();
  updateKPIs();
  renderStory();
  switchTab('story');
}

// ═══════════════════════════════════════════════
// DASHBOARD
// ═══════════════════════════════════════════════
function renderDashboard() {
  const view = document.getElementById('view-dashboard');
  view.innerHTML = `
    <div class="dash-card">
      <h4>💰 Finanzen</h4>
      <div class="dash-stat"><span>Kassa</span><span class="val">${fmt(Math.max(0,G.kassa))}</span></div>
      <div class="dash-stat"><span>Bank</span><span class="val">${fmt(G.bank)}</span></div>
      <div class="dash-stat"><span>Umsatz gesamt</span><span class="val yellow">${fmt(G.umsatz)}</span></div>
      <div class="dash-stat"><span>Gewinn gesamt</span><span class="val ${G.gewinn < 0 ? 'red' : ''}">${fmt(G.gewinn)}</span></div>
    </div>
    <div class="dash-card">
      <h4>📋 Verbindlichkeiten & Forderungen</h4>
      <div class="dash-stat"><span>Forderungen</span><span class="val">${fmt(G.forderungen)}</span></div>
      <div class="dash-stat"><span>Verbindlichkeiten</span><span class="val red">${fmt(G.verbindlichkeiten)}</span></div>
      ${G.kredite.map(k => `<div class="dash-stat"><span>Kredit: ${k.name}</span><span class="val red">${fmt(k.betrag)}</span></div>`).join('')}
    </div>
    <div class="dash-card">
      <h4>👥 Personal</h4>
      ${G.mitarbeiter.length === 0 ? '<p style="color:var(--muted);font-size:0.85rem">Noch keine Mitarbeiter</p>' : G.mitarbeiter.map(m => `<div class="dash-stat"><span>${m.name}</span><span class="val">${fmt(m.brutto)} brutto</span></div>`).join('')}
    </div>
    <div class="dash-card">
      <h4>🏭 Anlagevermögen</h4>
      ${G.anlagen.length === 0 ? '<p style="color:var(--muted);font-size:0.85rem">Noch keine Anlagen</p>' : G.anlagen.map(a => `<div class="dash-stat"><span>${a.name}</span><span class="val">${fmt(a.wert)}</span></div><div class="dash-stat"><span>AfA/Jahr</span><span class="val red">${fmt(a.afa)}</span></div>`).join('')}
    </div>
    <div class="dash-card" style="grid-column:1/-1">
      <h4>🏅 Errungenschaften</h4>
      <div class="flex-row">${G.badges.length === 0 ? '<span style="color:var(--muted);font-size:0.85rem">Noch keine Errungenschaften</span>' : G.badges.map(b => `<span class="badge unlocked">${b}</span>`).join('')}</div>
    </div>
  `;
}

// ═══════════════════════════════════════════════
// BUCHHALTUNG
// ═══════════════════════════════════════════════
function renderBuchh() {
  const view = document.getElementById('view-buchh');
  let rows = G.buchungen.map(b => `
    <tr>
      <td>${b.datum}</td>
      <td>${b.text}</td>
      <td><span class="tag ${b.art}">${b.art === 'einnahme' ? 'Einnahme' : 'Ausgabe'}</span></td>
      <td class="${b.betrag > 0 ? 'debit' : 'credit'}">${b.betrag > 0 ? '+' : ''}${fmt(b.betrag)}</td>
    </tr>
  `).join('');
  if (!rows) rows = '<tr><td colspan="4" style="color:var(--muted);text-align:center;padding:1rem">Noch keine Buchungen</td></tr>';
  view.innerHTML = `
    <h2 class="section-title">📒 Buchungsjournal</h2>
    <table class="buchh-table">
      <thead><tr><th>Datum</th><th>Beschreibung</th><th>Art</th><th>Betrag</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  `;
}

// ═══════════════════════════════════════════════
// LAGER
// ═══════════════════════════════════════════════
function renderLager() {
  const view = document.getElementById('view-lager');
  view.innerHTML = `
    <div class="lager-item"><div class="icon">🍋</div><div class="name">Zitronen</div><div class="qty">${G.lager.zitronen}</div><div class="unit">Stück</div></div>
    <div class="lager-item"><div class="icon">🍬</div><div class="name">Zucker</div><div class="qty">${G.lager.zucker}</div><div class="unit">kg</div></div>
    <div class="lager-item"><div class="icon">🍹</div><div class="name">Fertige Limos</div><div class="qty">${G.lager.limo}</div><div class="unit">Gläser</div></div>
    ${G.anlagen.map(a => `<div class="lager-item"><div class="icon">🧊</div><div class="name">${a.name}</div><div class="qty">${fmt(a.wert)}</div><div class="unit">Restwert</div></div>`).join('')}
  `;
}

// ═══════════════════════════════════════════════
// TAB SWITCHING
// ═══════════════════════════════════════════════
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    const tabs = ['story','dashboard','buchh','lager'];
    t.className = 'tab' + (tabs[i] === tab ? ' active' : '');
  });
  ['story','dashboard','buchh','lager'].forEach(v => {
    document.getElementById('view-' + v).style.display = v === tab ? (v === 'dashboard' ? 'grid' : v === 'lager' ? 'grid' : 'flex') : 'none';
  });
  if (tab === 'dashboard') renderDashboard();
  else if (tab === 'buchh') renderBuchh();
  else if (tab === 'lager') renderLager();
}

// ═══════════════════════════════════════════════
// SCREEN TRANSITIONS
// ═══════════════════════════════════════════════
function startGame() {
  document.getElementById('screen-title').classList.remove('active');
  document.getElementById('screen-game').classList.add('active');
  buildChapterList();
  updateKPIs();
  renderStory();
}

function showTitle() {
  document.getElementById('screen-game').classList.remove('active');
  document.getElementById('screen-title').classList.add('active');
}
</script>
